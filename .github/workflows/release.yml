name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v0.1.0)'
        required: true
        type: string

# One release per ref at a time: a re-tag cancels the in-flight run so old and
# new runs don't pile up competing for the (limited) macOS/ARM runners.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fail fast if the git tag and versions.env disagree, so a release never ships
  # a bundle whose embedded version lies about what it is.
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Compare tag to versions.env
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.version || github.ref_name }}"
          echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "::error::version '$TAG' is not of the form vX.Y.Z"; exit 1; }
          . ./versions.env
          echo "tag: $TAG / versions.env BUNDLE_VERSION: $BUNDLE_VERSION"
          [ "$TAG" = "$BUNDLE_VERSION" ] || { echo "::error::tag $TAG != BUNDLE_VERSION $BUNDLE_VERSION"; exit 1; }

  # One runner per target, native wheels only — no compilation happens in the
  # build, so the lone non-native leg (macos-x86_64, assembled on the arm
  # runner) just needs Rosetta 2 to run the x86_64 interpreter: GitHub retired
  # its free Intel-mac runners, and emulation is exactly as good here.
  build:
    needs: [verify-version]
    name: bundle ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: linux-x86_64,   os: ubuntu-latest,    pbs: x86_64-unknown-linux-gnu }
          - { target: linux-aarch64,  os: ubuntu-24.04-arm, pbs: aarch64-unknown-linux-gnu }
          - { target: macos-aarch64,  os: macos-14,         pbs: aarch64-apple-darwin }
          - { target: macos-x86_64,   os: macos-14,         pbs: x86_64-apple-darwin }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Ensure zstd + GNU tar
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            command -v zstd >/dev/null 2>&1 || brew install zstd
            command -v gtar >/dev/null 2>&1 || brew install gnu-tar
          else
            command -v zstd >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y zstd; }
          fi
      - name: Ensure Rosetta 2 (x86_64 interpreter on the arm runner)
        if: matrix.target == 'macos-x86_64'
        run: sudo softwareupdate --install-rosetta --agree-to-license
      - name: Build bundle
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          PBS_TRIPLE: ${{ matrix.pbs }}
        run: bash scripts/build-bundle.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bundle-${{ matrix.target }}
          path: dist/mermaid-searxng-*

  # Build the linux-x86_64 bundle twice and require byte-identical output, so a
  # reproducibility regression (floating dep, unclamped timestamp, unstable tar
  # ordering) blocks the release instead of silently changing the artifact.
  repro-check:
    needs: [verify-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Ensure zstd
        run: command -v zstd >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y zstd; }
      - name: Build twice and compare
        env:
          TARGET: linux-x86_64
          PBS_TRIPLE: x86_64-unknown-linux-gnu
        run: |
          set -euo pipefail
          bash scripts/build-bundle.sh
          mv dist/mermaid-searxng-linux-x86_64.tar.zst first.tar.zst
          bash scripts/build-bundle.sh
          sha256sum first.tar.zst dist/mermaid-searxng-linux-x86_64.tar.zst
          cmp first.tar.zst dist/mermaid-searxng-linux-x86_64.tar.zst \
            || { echo "::error::rebuild produced a different artifact — reproducibility regression"; exit 1; }

  publish:
    needs: [build, repro-check]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
      - name: Collect artifacts + SHA256SUMS
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f -name 'mermaid-searxng-*' -exec cp {} dist/ \;
          cd dist
          sha256sum mermaid-searxng-* | sort -k2 > SHA256SUMS
          echo "--- SHA256SUMS ---"; cat SHA256SUMS
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: |
            dist/mermaid-searxng-*
            dist/SHA256SUMS
          generate_release_notes: true

  # Bump the pinned bundle version in noahsabaj/mermaid-cli via an automated PR —
  # the analog of mermaid-cli's own brew/scoop/winget bumps, running
  # scripts/bump_searxng_bundle.py over the published SHA256SUMS. Credentials, in
  # preference order (no-op if neither is set):
  #   1. A GitHub App installed on mermaid-cli (BUMP_APP_ID + BUMP_APP_PRIVATE_KEY
  #      secrets; needs contents + pull-requests write). Preferred: tokens are
  #      minted per-run, never expire as a unit, and App-created PRs trigger
  #      mermaid-cli's CI.
  #   2. BUMP_TOKEN, a fine-grained PAT with the same permissions (expires; PRs
  #      also trigger CI).
  bump-mermaid-cli:
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - name: Gate on bump credentials
        id: gate
        env:
          BUMP_APP_ID: ${{ secrets.BUMP_APP_ID }}
          BUMP_TOKEN: ${{ secrets.BUMP_TOKEN }}
        run: |
          if [ -n "${BUMP_APP_ID:-}" ]; then echo "mode=app" >> "$GITHUB_OUTPUT";
          elif [ -n "${BUMP_TOKEN:-}" ]; then echo "mode=pat" >> "$GITHUB_OUTPUT";
          else echo "neither BUMP_APP_ID nor BUMP_TOKEN is set — skipping the mermaid-cli bump."; echo "mode=off" >> "$GITHUB_OUTPUT"; fi
      - name: Mint an installation token (GitHub App)
        if: steps.gate.outputs.mode == 'app'
        id: app
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.BUMP_APP_ID }}
          private-key: ${{ secrets.BUMP_APP_PRIVATE_KEY }}
          owner: noahsabaj
          repositories: mermaid-cli
      - name: Open bump PR against mermaid-cli
        if: steps.gate.outputs.mode != 'off'
        env:
          GH_TOKEN: ${{ steps.app.outputs.token || secrets.BUMP_TOKEN }}
          TAG: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          set -euo pipefail
          # Make git push authenticate through gh (git ignores GH_TOKEN, and
          # `gh repo clone` does not configure a credential helper on its own).
          gh auth setup-git
          gh repo clone noahsabaj/mermaid-cli cli -- --depth 1
          curl -fsSL -o "$RUNNER_TEMP/SHA256SUMS" \
            "https://github.com/noahsabaj/mermaid-searxng/releases/download/${TAG}/SHA256SUMS"
          cd cli
          python3 scripts/bump_searxng_bundle.py "$TAG" "$RUNNER_TEMP/SHA256SUMS"
          git checkout -b "bump-searxng-bundle-${TAG}"
          git -c user.name=github-actions[bot] \
              -c user.email=41898282+github-actions[bot]@users.noreply.github.com \
              commit -am "chore(searxng): pin bundle ${TAG}"
          git push -u origin "bump-searxng-bundle-${TAG}"
          gh pr create --repo noahsabaj/mermaid-cli --base main \
            --title "chore(searxng): pin bundle ${TAG}" \
            --body "Automated bundle version + checksum bump to \`${TAG}\`."
